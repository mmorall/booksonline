apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bookstore-api-hpa
  namespace: books-online
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bookstore-api
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0 # React instantly
      policies:
      - type: Percent
        value: 100 # Allow doubling the pods every 15 seconds
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300 # Wait 5 mins before scaling down to prevent thrashing
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60