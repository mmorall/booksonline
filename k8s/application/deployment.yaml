apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-api
  namespace: books-online
  labels:
    app: bookstore-api
spec:
  replicas: 1 # Starts at 1, HPA will scale it up if needed
  selector:
    matchLabels:
      app: bookstore-api
  template:
    metadata:
      labels:
        app: bookstore-api
    spec:
      containers:
      - name: api
        image: ghcr.io/mmorall/bookstore-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        
        # Connect to Postgres securely using the secret auto-generated by CNPG
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: books-online-db-app # Created by CloudNativePG
              key: uri

        # If the app freezes or fails, k3s will automatically restart it
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5

        # Required for the Autoscaler to work
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: bookstore-api-svc
  namespace: books-online
spec:
  selector:
    app: bookstore-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080