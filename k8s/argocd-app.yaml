apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: books-online-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mmorall/booksonline.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: books-online
  syncPolicy:
    automated:
      prune: true     # Automatically delete k8s resources if you delete them from Git
      selfHeal: true  # If a human modifies a setting manually, Argo resets it
    syncOptions:
    - CreateNamespace=true